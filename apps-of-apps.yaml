# Root Application — apps-of-apps pattern.
# Cada Application apunta a un directorio gitops-core-<env> que contiene
# las Application CRs individuales de cada app en ese ambiente.
# Aplicar manualmente tras bootstrap de ArgoCD:
#   kubectl apply -f gitops-files/apps-of-apps.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-core-dev
  namespace: argocd
  labels:
    environment: dev
spec:
  project: default
  source:
    repoURL: https://github.com/Valentino-33/gitops-files
    targetRevision: main
    path: gitops-core-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
