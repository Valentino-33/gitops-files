apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webserver-api02-production
  namespace: argocd
  labels:
    app: webserver-api02
    environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/Valentino-33/belo-helm-charts
    targetRevision: main
    path: pythonapps
    helm:
      valueFiles:
      - apps/webserver-api02/build-time/app.yaml
      - apps/webserver-api02/production/values-webserver-api02-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true
  ignoreDifferences:
  - group: argoproj.io
    kind: Rollout
    jsonPointers:
    - /spec/replicas
